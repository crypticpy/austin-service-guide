id: svc-cis-central-tx
name: Communities In Schools of Central Texas
slug: communities-in-schools
provider_name: Communities In Schools of Central Texas (CIS)
description: School-based case management for K-12 students at risk of dropping out — licensed counselors,
  social workers, and academic coaches embedded on AISD, Del Valle, Manor, and Pflugerville ISD campuses.
  Services include one-on-one mental-health counseling, family advocacy, attendance interventions, and
  referrals to outside therapists when needed. Free for any student attending a partner campus.
eligibility_summary: Enrolled at a CIS partner campus (AISD, Del Valle ISD, Manor ISD, or Pflugerville
  ISD). Self-referral, parent referral, or teacher/counselor referral all accepted.
how_to_apply: Ask your child's school counselor or principal for the CIS site coordinator, or call 512-462-1771
  for a list of partner campuses.
