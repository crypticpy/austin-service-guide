id: svc-tchhs-util
name: Travis County Utility Assistance
slug: travis-county-utility-assistance
provider_name: Travis County Health & Human Services
description: One-time emergency utility-bill assistance for low-income county residents to prevent disconnection
  of electric, water, or gas service. Funded by CSBG and county dollars.
