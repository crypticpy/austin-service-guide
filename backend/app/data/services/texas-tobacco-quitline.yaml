id: svc-yes-quit
name: Texas Tobacco Quitline (Yes Quit)
slug: texas-tobacco-quitline
provider_name: Texas Department of State Health Services
description: Free coaching, nicotine replacement therapy, and a personalized quit plan delivered by phone,
  text, or web. Available in English and Spanish, with a teen-specific track and a Medicaid track that
  ships NRT directly to participants.
