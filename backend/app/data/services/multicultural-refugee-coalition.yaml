id: svc-multicultural-refugee
name: Multicultural Refugee Coalition
slug: multicultural-refugee-coalition
provider_name: Multicultural Refugee Coalition
description: Long-term integration support for refugee and immigrant families past their initial resettlement
  window. Programs include New Leaf Agriculture (paid farm training), women's wellness circles, youth
  mentoring, and a sewing co-op. Acts as a 'soft landing' partner when official case-management timelines
  run out.
eligibility_summary: Refugee, asylee, immigrant, or other newcomer status. Open to families who have aged
  out of formal resettlement support.
how_to_apply: Stop by the office or call 512-953-5184 — staff will route you to the right program.
