id: svc-refugee-services-tx
name: Refugee Services of Texas — Austin
slug: refugee-services-of-texas-austin
provider_name: Refugee Services of Texas
description: Resettlement case management for refugees, asylees, and SIVs (Special Immigrant Visa holders)
  in their first 3-5 years in Austin. Wraparound services include housing setup, school enrollment, employment
  coaching, ESL classes, and benefits navigation. Bilingual case managers in Arabic, Dari, Pashto, Swahili,
  French, and Spanish.
eligibility_summary: Refugee, asylee, SIV, parolee, or Cuban/Haitian entrant status, residing in Travis
  or Williamson County. Most case-management services time-bounded to first 5 years post-arrival; one-off
  services (interpretation, advocacy) available longer.
how_to_apply: Walk-in welcome at the Austin office, or call 512-472-9472. New-arrival referrals typically
  come from your sponsoring resettlement agency.
