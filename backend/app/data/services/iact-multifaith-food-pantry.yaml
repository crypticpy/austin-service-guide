slug: iact-multifaith-food-pantry
provider_name: Interfaith Action of Central Texas (iACT)
description: Culturally-aware food pantry serving refugee and immigrant families in north Austin — halal-certified
  meats, regional staples (rice, lentils, spices), and infant formula stocked. Bilingual volunteers and
  case-worker referrals from RST, Caritas, and Multicultural Refugee Coalition encouraged.
eligibility_summary: Open to anyone in food need; no income or status verification required. Refugee/immigrant
  families prioritized for cultural-needs stocking.
how_to_apply: Drop in during open hours, or have your case worker call 512-386-9145 to schedule a first
  visit.
