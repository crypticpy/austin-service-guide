id: svc-cool-network
name: Austin–Travis County Cooling Center Network
slug: cooling-center-network
provider_name: City of Austin & Austin Public Library
description: During heat advisories, libraries, recreation centers, and senior centers across Austin operate
  as drop-in cooling centers — free, no ID required, water provided. Especially important for outdoor
  workers, residents without home AC, and people with chronic conditions that compound heat risk.
eligibility_summary: Open to all — no ID, address, or income check.
how_to_apply: Walk in to any participating library, rec center, or senior center during operating hours.
  Call 3-1-1 for current open locations during a heat advisory.
cost: Free
cost_type: free
website_url: https://www.austintexas.gov/cooling-centers
phone: 3-1-1
email: ''
languages_offered:
- en
- es
accessibility_features:
- Wheelchair accessible
- Pet-friendly at select locations
status: active
categories:
- cooling
- emergency
