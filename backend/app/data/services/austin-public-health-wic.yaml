slug: austin-public-health-wic
provider_name: Austin Public Health
description: The Women, Infants, and Children (WIC) program provides nutritious foods, nutrition education,
  breastfeeding support, and referrals to healthcare and community services.
eligibility_summary: Pregnant, postpartum, or breastfeeding women; infants and children under age 5. Must
  meet income guidelines (≤185% FPL).
