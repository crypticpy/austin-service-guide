id: svc-heat-relief
name: Heat Relief & AC Repair Assistance
slug: heat-relief-ac-assistance
provider_name: Family Eldercare & Austin Energy
description: One-time financial assistance for AC repair, AC unit replacement, or window-unit purchase
  for income-qualified residents — prioritized for older adults, outdoor workers, and households with
  chronic medical conditions during summer heat advisories. Includes a free fan distribution program in
  May–September.
eligibility_summary: 'Travis County resident, household income at or below 200% FPL, AND one of: age 60+,
  household member with chronic cardiac/respiratory/renal condition, primary earner works outdoors, or
  household includes a child under 5.'
how_to_apply: Call 512-459-4837 (Family Eldercare summer program intake) or apply online during the May–September
  enrollment window.
cost: Free
cost_type: free
