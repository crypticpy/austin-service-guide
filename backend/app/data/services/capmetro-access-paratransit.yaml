id: svc-cm-access
name: CapMetro Access Paratransit
slug: capmetro-access-paratransit
provider_name: Capital Metro
description: ADA-complementary paratransit service providing curb-to-curb shared rides for people whose
  disability prevents them from using the fixed-route bus and rail system.
eligibility_summary: Individuals certified through CapMetro's Eligibility Center as unable to use fixed-route
  service due to a disability.
how_to_apply: Call 512-369-6010 to begin the eligibility process and schedule an in-person assessment.
