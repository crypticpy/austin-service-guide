id: svc-cap
name: Customer Assistance Program (CAP)
slug: customer-assistance-program
provider_name: City of Austin
description: Provides discounts on City of Austin utility bills (electric, water, wastewater, trash) for
  qualifying low-income customers. Discount is approximately 10-15% of the average bill.
eligibility_summary: City of Austin utility customers with household income ≤200% FPL, or enrolled in
  certain assistance programs (SNAP, Medicaid, SSI, TANF).
how_to_apply: Apply online at austinenergy.com/go/cap, by phone, or in person.
